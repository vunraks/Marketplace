services:
  postgres:
    image: postgres:16-alpine
    container_name: vaulttrade-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0103
      POSTGRES_DB: Market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaulttrade-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=Market;Username=postgres;Password=0103
      Jwt__Secret: VaultTrade-Super-Secret-Key-Min-32-Chars-For-Development!
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
