services:
  - type: web
    name: vaulttrade-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        value: VaultTrade
      - key: Jwt__Audience
        value: VaultTrade.Web
      - key: Authentication__Google__ClientId
        sync: false
      - key: Cors__Origins__0
        sync: false
